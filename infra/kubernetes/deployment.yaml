apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-training-serving-platform
  labels:
    app: ml-training-serving-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-training-serving-platform
  template:
    metadata:
      labels:
        app: ml-training-serving-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/monitoring"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: ghcr.io/srn91/ml-training-serving-platform:latest
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
